<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>FloodRoute | Tactical Field Logger</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; background-color: #09090b; color: #f8fafc; }
    .mono { font-family: 'JetBrains Mono', monospace; }
    .glass-panel { background: #18181b; border: 1px solid #27272a; border-radius: 6px; }
    .btn { transition: all 0.15s ease; border: 1px solid #3f3f46; background: #27272a; cursor: pointer; }
    .btn:hover:not(:disabled) { background: #f8fafc; color: #09090b; border-color: #f8fafc; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    /* Hide scrollbar for cleaner UI */
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>
<body class="min-h-screen p-4 md:p-6 flex flex-col max-w-3xl mx-auto w-full gap-6">

  <header class="border-b border-zinc-800 pb-4">
    <div class="flex justify-between items-baseline">
      <div>
        <h1 class="text-2xl font-bold tracking-tighter mono uppercase text-zinc-100">FloodRoute</h1>
        <p class="text-[10px] text-zinc-500 mt-1 uppercase tracking-widest mono">Offline Incident Logger v1.0</p>
      </div>
      <div class="text-[10px] mono text-emerald-500 border border-emerald-900 bg-emerald-950/30 px-2 py-1 rounded">
        LOCAL STORAGE ACTIVE
      </div>
    </div>
  </header>

  <main class="flex flex-col gap-6">
    
    <section class="glass-panel p-5 space-y-5">
      <div class="flex justify-between items-center border-b border-zinc-800 pb-2">
        <h2 class="mono text-[11px] uppercase text-zinc-400 font-bold">1. Capture Telemetry</h2>
      </div>

      <div class="bg-black border border-zinc-800 p-3 rounded text-[11px] mono flex justify-between items-center">
        <div>
          <span class="text-zinc-500">LAT:</span> <span id="disp-lat" class="text-zinc-300">WAITING</span><br>
          <span class="text-zinc-500">LNG:</span> <span id="disp-lng" class="text-zinc-300">WAITING</span>
        </div>
        <button id="btn-gps" class="btn px-3 py-2 rounded text-[10px] uppercase font-bold text-zinc-300">Pin GPS</button>
      </div>

      <div class="relative bg-black aspect-video border border-zinc-800 rounded flex items-center justify-center overflow-hidden" id="image-preview">
        <span class="text-zinc-600 text-[10px] mono">[ NO IMAGE LOADED ]</span>
      </div>
      
      <input type="file" id="camera-input" accept="image/*" capture="environment" class="hidden" />
      <button onclick="document.getElementById('camera-input').click()" class="btn w-full py-3 rounded text-[11px] mono uppercase font-bold text-zinc-300">
        Open Camera / Gallery
      </button>

      <div class="space-y-2 pt-2">
        <label class="mono text-[10px] text-zinc-500 uppercase">Observer Tag (Severity)</label>
        <select id="severity-select" class="w-full bg-black border border-zinc-800 text-zinc-300 text-[12px] p-2 rounded mono focus:outline-none focus:border-zinc-500">
          <option value="NOMINAL">Nominal (Puddling, Passable)</option>
          <option value="ELEVATED">Elevated (Standing Water, Caution)</option>
          <option value="CRITICAL">Critical (Deep Water, Impassable)</option>
        </select>
      </div>

      <button id="btn-save" class="w-full bg-blue-600 hover:bg-blue-500 text-white py-3 rounded text-[12px] mono uppercase font-bold transition disabled:opacity-50 disabled:bg-zinc-800" disabled>
        Commit to Local Ledger
      </button>
    </section>

    <section class="glass-panel p-5 space-y-4">
      <div class="flex justify-between items-center border-b border-zinc-800 pb-2">
        <h2 class="mono text-[11px] uppercase text-zinc-400 font-bold">2. Local Ledger</h2>
        <button id="btn-export" class="text-blue-400 hover:text-blue-300 text-[10px] mono uppercase underline">Export JSON</button>
      </div>

      <div id="ledger-list" class="space-y-3 max-h-64 overflow-y-auto no-scrollbar">
        </div>
      
      <button id="btn-clear" class="w-full text-red-500 border border-red-900/50 hover:bg-red-950/30 py-2 rounded text-[10px] mono uppercase transition mt-2">
        Clear Ledger
      </button>
    </section>

  </main>

  <script>
    // State variables
    let currentLat = null;
    let currentLng = null;
    let currentImageBase64 = null;
    
    // Elements
    const btnGps = document.getElementById('btn-gps');
    const dispLat = document.getElementById('disp-lat');
    const dispLng = document.getElementById('disp-lng');
    const cameraInput = document.getElementById('camera-input');
    const imagePreview = document.getElementById('image-preview');
    const severitySelect = document.getElementById('severity-select');
    const btnSave = document.getElementById('btn-save');
    const ledgerList = document.getElementById('ledger-list');

    // --- 1. Load Existing Data from LocalStorage ---
    let logs = JSON.parse(localStorage.getItem('floodroute_logs')) || [];
    renderLedger();

    // --- 2. GPS Handling ---
    btnGps.addEventListener('click', () => {
      btnGps.textContent = "LOCATING...";
      navigator.geolocation.getCurrentPosition(
        pos => {
          currentLat = pos.coords.latitude.toFixed(6);
          currentLng = pos.coords.longitude.toFixed(6);
          dispLat.textContent = currentLat;
          dispLng.textContent = currentLng;
          dispLat.classList.replace('text-zinc-300', 'text-blue-400');
          dispLng.classList.replace('text-zinc-300', 'text-blue-400');
          btnGps.textContent = "PINNED";
          checkReadyState();
        },
        err => {
          alert("GPS Error: Ensure location permissions are granted.");
          btnGps.textContent = "RETRY GPS";
        },
        { enableHighAccuracy: true, timeout: 10000 }
      );
    });

    // --- 3. Image Handling (Compressing to save LocalStorage space) ---
    cameraInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = (event) => {
        const img = new Image();
        img.onload = () => {
          // Compress image using a canvas before saving to prevent blowing up local storage
          const canvas = document.createElement('canvas');
          const MAX_WIDTH = 640;
          const scaleSize = MAX_WIDTH / img.width;
          canvas.width = MAX_WIDTH;
          canvas.height = img.height * scaleSize;
          
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
          
          // Get compressed base64 string (JPEG quality 0.6)
          currentImageBase64 = canvas.toDataURL('image/jpeg', 0.6);
          
          imagePreview.innerHTML = `<img src="${currentImageBase64}" class="w-full h-full object-cover" />`;
          checkReadyState();
        };
        img.src = event.target.result;
      };
      reader.readAsDataURL(file);
    });

    // --- 4. Validation ---
    function checkReadyState() {
      if (currentLat && currentLng && currentImageBase64) {
        btnSave.disabled = false;
      }
    }

    // --- 5. Saving to LocalStorage ---
    btnSave.addEventListener('click', () => {
      const logEntry = {
        id: Date.now(),
        timestamp: new Date().toISOString(),
        lat: currentLat,
        lng: currentLng,
        severity: severitySelect.value,
        image: currentImageBase64
      };

      logs.unshift(logEntry); // Add to beginning of array
      
      try {
        localStorage.setItem('floodroute_logs', JSON.stringify(logs));
        
        // Reset UI for next entry
        currentImageBase64 = null;
        imagePreview.innerHTML = `<span class="text-zinc-600 text-[10px] mono">[ CAPTURE SAVED. READY FOR NEXT. ]</span>`;
        btnSave.disabled = true;
        
        renderLedger();
      } catch (e) {
        alert("Storage Full! Please export and clear your ledger.");
        logs.shift(); // Remove the item that failed to save
      }
    });

    // --- 6. Render Ledger UI ---
    function renderLedger() {
      ledgerList.innerHTML = '';
      if (logs.length === 0) {
        ledgerList.innerHTML = `<div class="text-center text-[10px] text-zinc-600 mono py-4">Ledger is empty.</div>`;
        return;
      }

      logs.forEach(log => {
        let colorClass = log.severity === 'CRITICAL' ? 'text-red-500' : (log.severity === 'ELEVATED' ? 'text-yellow-500' : 'text-emerald-500');
        
        const el = document.createElement('div');
        el.className = "bg-black border border-zinc-800 p-3 rounded flex gap-3 items-center";
        el.innerHTML = `
          <img src="${log.image}" class="w-12 h-12 object-cover rounded border border-zinc-700" />
          <div class="flex-grow">
            <div class="text-[10px] mono ${colorClass} font-bold">${log.severity}</div>
            <div class="text-[9px] mono text-zinc-500">${new Date(log.timestamp).toLocaleTimeString()} | ${log.lat}, ${log.lng}</div>
          </div>
        `;
        ledgerList.appendChild(el);
      });
    }

    // --- 7. Export & Clear Data ---
    document.getElementById('btn-export').addEventListener('click', () => {
      if (logs.length === 0) return alert("Nothing to export.");
      
      // Create a clean version without the heavy base64 images if desired, 
      // but for this prototype, we'll export everything.
      const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(logs, null, 2));
      const downloadAnchorNode = document.createElement('a');
      downloadAnchorNode.setAttribute("href", dataStr);
      downloadAnchorNode.setAttribute("download", `floodroute_export_${Date.now()}.json`);
      document.body.appendChild(downloadAnchorNode);
      downloadAnchorNode.click();
      downloadAnchorNode.remove();
    });

    document.getElementById('btn-clear').addEventListener('click', () => {
      if(confirm("Are you sure? This will delete all offline data.")) {
        logs = [];
        localStorage.removeItem('floodroute_logs');
        renderLedger();
      }
    });
  </script>
</body>
</html>
